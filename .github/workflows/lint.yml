name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0

      - name: Install lychee
        run: |
          curl -sSfL "https://github.com/lycheeverse/lychee/releases/download/lychee-v0.24.2/lychee-x86_64-unknown-linux-gnu.tar.gz" -o /tmp/lychee.tar.gz
          echo "1f4e0ef7f6554a6ed33dd7ac144fb2e1bbed98598e7af973042fc5cd43951c9a  /tmp/lychee.tar.gz" | sha256sum -c
          tar xzf /tmp/lychee.tar.gz -C /usr/local/bin lychee

      - name: Install pre-commit
        run: uv pip install --system pre-commit

      - name: Run pre-commit (skip ty)
        run: SKIP=ty pre-commit run --all-files

      - name: Run ty check
        run: uvx ty check hack/

      - name: Run ADR linting
        run: make lint

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Run Vitest (admin SPA)
        run: npm test

      - name: Run svelte-check
        run: npm run check
