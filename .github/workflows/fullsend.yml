name: fullsend

on:
  issues:
    types: [opened, edited, labeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [synchronize]

jobs:
  triage:
    name: Triage
    if: |
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' && (
        startsWith(github.event.comment.body || '', '/triage ') ||
        (github.event.comment.body || '') == '/triage'
      ))
    runs-on: ubuntu-latest
    concurrency:
      group: fullsend-triage-${{ github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.FULLSEND_TRIAGE_BOT_TOKEN }}
          fetch-depth: 1

      - name: Setup agent environment
        env:
          STAGE_PREFIX: TRIAGE_
          TRIAGE_FULLSEND_TRIAGE_BOT_TOKEN: ${{ secrets.FULLSEND_TRIAGE_BOT_TOKEN }}
        run: bash dispatch/github/scripts/setup-agent-env.sh

      - name: Run triage agent(s)
        uses: ./dispatch/github/actions/fullsend
        with:
          stage: triage

  review:
    name: Review
    if: |
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'ready-for-review') ||
      (github.event_name == 'issue_comment' && (
        startsWith(github.event.comment.body || '', '/review ') ||
        (github.event.comment.body || '') == '/review'
      )) ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: fullsend-review-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.FULLSEND_REVIEW_BOT_TOKEN }}
          fetch-depth: 1

      - name: Setup agent environment
        env:
          STAGE_PREFIX: REVIEW_
          REVIEW_FULLSEND_REVIEW_BOT_TOKEN: ${{ secrets.FULLSEND_REVIEW_BOT_TOKEN }}
        run: bash dispatch/github/scripts/setup-agent-env.sh

      - name: Run review agent(s)
        uses: ./dispatch/github/actions/fullsend
        with:
          stage: review

  implementation:
    name: Implementation
    if: |
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'ready-to-implement') ||
      (github.event_name == 'issue_comment' && (
        startsWith(github.event.comment.body || '', '/implement ') ||
        (github.event.comment.body || '') == '/implement'
      ))
    runs-on: ubuntu-latest
    concurrency:
      group: fullsend-implementation-${{ github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.FULLSEND_IMPLEMENTATION_BOT_TOKEN }}
          fetch-depth: 1

      - name: Setup agent environment
        env:
          STAGE_PREFIX: IMPLEMENTATION_
          IMPLEMENTATION_FULLSEND_IMPLEMENTATION_BOT_TOKEN: ${{ secrets.FULLSEND_IMPLEMENTATION_BOT_TOKEN }}
        run: bash dispatch/github/scripts/setup-agent-env.sh

      - name: Run implementation agent(s)
        uses: ./dispatch/github/actions/fullsend
        with:
          stage: implementation
