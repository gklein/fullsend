name: Triage

on:
  workflow_dispatch:
    inputs:
      event_type:
        required: true
        type: string
      source_repo:
        required: true
        type: string
      event_payload:
        required: true
        type: string

concurrency:
  group: fullsend-triage-${{ fromJSON(inputs.event_payload).issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    name: Triage
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      id-token: write
      issues: write

    steps:
      - name: Checkout .fullsend repository
        uses: actions/checkout@v6

      - name: Validate source repo is enrolled
        env:
          SOURCE_REPO: ${{ inputs.source_repo }}
        run: |
          # Format check — must be owner/repo, safe characters only
          if [[ ! "$SOURCE_REPO" =~ ^[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+$ ]]; then
            echo "::error::Invalid source_repo format: must be owner/repo"
            exit 1
          fi
          # Owner check — must match this org
          REPO_OWNER="${SOURCE_REPO%%/*}"
          if [[ "$REPO_OWNER" != "$GITHUB_REPOSITORY_OWNER" ]]; then
            echo "::error::source_repo owner does not match org"
            exit 1
          fi
          # Allowlist check — repo must be enabled in config.yaml
          REPO_NAME="${SOURCE_REPO#*/}"
          ENABLED=$(yq ".repos.\"$REPO_NAME\".enabled" config.yaml 2>/dev/null)
          if [[ "$ENABLED" != "true" ]]; then
            echo "::error::repo is not enabled in config.yaml"
            exit 1
          fi

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.FULLSEND_TRIAGE_CLIENT_ID }}
          private-key: ${{ secrets.FULLSEND_TRIAGE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.source_repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: target-repo
          fetch-depth: 1

      - name: Authenticate to Google Cloud (WIF)
        if: secrets.FULLSEND_GCP_WIF_PROVIDER != ''
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.FULLSEND_GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.FULLSEND_GCP_WIF_SA_EMAIL }}

      - name: Authenticate to Google Cloud (SA key)
        if: secrets.FULLSEND_GCP_WIF_PROVIDER == ''
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FULLSEND_GCP_SA_KEY_JSON }}

      - name: Mask GCP credential file paths
        run: |
          for var in GOOGLE_GHA_CREDS_PATH GOOGLE_APPLICATION_CREDENTIALS CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE; do
            val="${!var:-}"
            if [[ -n "${val}" ]]; then
              echo "::add-mask::${val}"
            fi
          done

      - name: Prepare sandbox credentials
        run: |
          CRED_CONFIG="$GOOGLE_APPLICATION_CREDENTIALS"
          CRED_TYPE=$(jq -r '.type // empty' "$CRED_CONFIG" 2>/dev/null || true)
          if [[ "$CRED_TYPE" == "external_account" ]]; then
            # The auth action writes credential_source.url (not .file) pointing to
            # GitHub's OIDC endpoint. The sandbox cannot reach that endpoint, so we
            # pre-fetch the OIDC token here and create a file-based credential config.
            OIDC_URL=$(jq -r '.credential_source.url // empty' "$CRED_CONFIG")
            OIDC_AUTH=$(jq -r '.credential_source.headers.Authorization // empty' "$CRED_CONFIG")
            if [[ -z "$OIDC_URL" || -z "$OIDC_AUTH" ]]; then
              echo "::error::WIF credential config missing credential_source.url or auth header"
              exit 1
            fi

            OIDC_DEST="$RUNNER_TEMP/gcp-oidc-token"
            curl -sSf -H "Authorization: $OIDC_AUTH" "$OIDC_URL" > "$OIDC_DEST"

            SANDBOX_CREDS="$RUNNER_TEMP/sandbox-gcp-credentials.json"
            jq '{
              type: .type,
              audience: .audience,
              subject_token_type: .subject_token_type,
              token_url: .token_url,
              service_account_impersonation_url: .service_account_impersonation_url,
              credential_source: {
                file: "/tmp/workspace/.gcp-oidc-token",
                format: .credential_source.format
              }
            }' "$CRED_CONFIG" > "$SANDBOX_CREDS"

            echo "GOOGLE_APPLICATION_CREDENTIALS=$SANDBOX_CREDS" >> "$GITHUB_ENV"
            echo "GCP_OIDC_TOKEN_FILE=$OIDC_DEST" >> "$GITHUB_ENV"
          fi

      - name: Setup agent environment
        env:
          AGENT_PREFIX: TRIAGE_
          TRIAGE_GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TRIAGE_TARGET_REPO_DIR: target-repo
          TRIAGE_ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          TRIAGE_CLOUD_ML_REGION: ${{ vars.FULLSEND_GCP_REGION }}
        run: bash .github/scripts/setup-agent-env.sh

      - name: Install validation dependencies
        run: pip install --quiet "jsonschema>=4.18.0"

      - name: Run triage agent
        uses: ./.github/actions/fullsend
        env:
          GITHUB_ISSUE_URL: ${{ fromJSON(inputs.event_payload).issue.html_url }}
        with:
          agent: triage
