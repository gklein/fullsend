name: Repo Maintenance

on:
  push:
    branches: [main]
    paths: [config.yaml, templates/shim-workflow-call.yaml]
  workflow_dispatch:

concurrency:
  group: repo-maintenance
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  reconcile:
    name: Reconcile enrollment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout .fullsend
        uses: actions/checkout@v6

      - name: Extract enrolled repo names from config
        id: repo-list
        run: |
          REPOS=$(yq '.repos | keys | join(",")' config.yaml)
          if [[ -z "$REPOS" ]]; then
            echo "::error::No repos found in config.yaml"
            exit 1
          fi
          echo "names=$REPOS" >> "$GITHUB_OUTPUT"

      - name: Mint fullsend token
        id: app-token
        uses: ./.github/actions/mint-token
        with:
          role: fullsend
          repos: ${{ steps.repo-list.outputs.names }}
          mint_url: ${{ vars.FULLSEND_MINT_URL }}

      - name: Reconcile target repos
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          WORKSPACE: ${{ github.workspace }}
        run: bash scripts/reconcile-repos.sh "$WORKSPACE"
