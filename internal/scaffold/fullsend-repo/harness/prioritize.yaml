agent: agents/prioritize.md
model: opus
image: ghcr.io/fullsend-ai/fullsend-sandbox:latest
policy: policies/prioritize.yaml

# No skills mounted yet. The agent prompt encourages opportunistic use of
# skills like customer-research when available — adding them here later
# will make them discoverable inside the sandbox.
skills: []

host_files:
  - src: env/gcp-vertex.env
    dest: /tmp/workspace/.env.d/gcp-vertex.env
    expand: true
  - src: ${GOOGLE_APPLICATION_CREDENTIALS}
    dest: /tmp/workspace/.gcp-credentials.json
  - src: ${GCP_OIDC_TOKEN_FILE}
    dest: /tmp/workspace/.gcp-oidc-token
    optional: true
  - src: env/prioritize.env
    dest: /tmp/workspace/.env.d/prioritize.env
    expand: true
  - src: /tmp/pre-prioritize-output.env
    dest: /tmp/workspace/.env.d/pre-prioritize-output.env
    optional: true

pre_script: scripts/pre-prioritize.sh

validation_loop:
  script: scripts/validate-output-schema.sh
  max_iterations: 2

post_script: scripts/post-prioritize.sh

runner_env:
  GH_TOKEN: ${GH_TOKEN}
  ORG: ${ORG}
  PROJECT_NUMBER: ${PROJECT_NUMBER}
  STALE_THRESHOLD: ${STALE_THRESHOLD}
  FULLSEND_OUTPUT_SCHEMA: ${FULLSEND_DIR}/schemas/prioritize-result.schema.json

timeout_minutes: 10
